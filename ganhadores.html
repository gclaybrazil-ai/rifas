<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Ganhadores - Top Sorte</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-32">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter" style="color: #00a650;">TOP<span style="color: #2c3e50;">SORTE</span></h1>
            <a href="index.html" class="text-xs font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-full px-3 py-1.5 transition-colors flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Início
            </a>
        </div>
    </header>

    <!-- Main View -->
    <main class="max-w-md md:max-w-2xl mx-auto mt-6 px-4 mb-10">
        
        <div class="text-center mb-10 mt-6">
            <h2 class="text-2xl md:text-3xl font-black text-[#2c3e50] tracking-tight mb-2">🏅 Galeria de Ganhadores</h2>
            <p class="text-sm text-gray-500 font-medium">Veja quem já teve a chance de mudar de vida com nossos sorteios!</p>
        </div>

        <div id="loading" class="text-center mt-10">
            <div class="animate-pulse bg-gray-200 h-24 rounded-[2rem] w-full mb-4"></div>
            <div class="animate-pulse bg-gray-200 h-24 rounded-[2rem] w-full mb-4"></div>
        </div>

        <div id="gallery-list" class="flex flex-col gap-6 hidden">
            <!-- Injetado via JS -->
        </div>
        
        <div id="empty-state" class="hidden text-center mt-14 bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <h3 class="text-gray-400 font-bold mb-2">Ainda não temos ganhadores publicados.</h3>
            <p class="text-gray-400 text-sm">Seja o primeiro a aparecer aqui!</p>
        </div>
        
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 z-50 px-6 py-2 pb-4">
        <div class="max-w-md md:max-w-2xl mx-auto flex justify-around items-center">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 transition-colors cursor-not-allowed opacity-50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[10px] font-bold">Meus Nros</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-[#00a650] drop-shadow-sm font-bold">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                <span class="text-[10px]">Ganhadores</span>
            </a>
        </div>
    </nav>

    <!-- Image Modal -->
    <div id="image-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 cursor-zoom-out transition-opacity duration-300 opacity-0 backdrop-blur-sm" onclick="closeImageModal()">
        <button class="absolute top-6 right-6 text-white/50 hover:text-white p-2 z-[110] transition-colors" onclick="closeImageModal()">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="modal-image" src="" class="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl transform scale-95 transition-transform duration-300 ring-4 ring-white/10" onclick="event.stopPropagation()">
    </div>

    <script>
        function openImageModal(src) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-image');
            img.src = src;
            modal.classList.remove('hidden');
            // trigger reflow
            void modal.offsetWidth;
            modal.classList.add('opacity-100');
            img.classList.remove('scale-95');
            img.classList.add('scale-100');
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-image');
            modal.classList.remove('opacity-100');
            img.classList.remove('scale-100');
            img.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
        document.addEventListener('DOMContentLoaded', async () => {
            const listEl = document.getElementById('gallery-list');
            const loader = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const res = await fetch('backend/api/get_publicacoes.php');
                const json = await res.json();
                
                loader.classList.add('hidden');
                
                if(json.data && json.data.length > 0) {
                    listEl.classList.remove('hidden');
                    json.data.forEach(p => {
                        const imgUrl = p.imagem_url ? p.imagem_url : 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcbkK3z3Q93lZ3q71_gK_3y313hT38qf7VjA&usqp=CAU';
                        
                        // Parse date for visual formatting
                        let dateStr = "Recentemente";
                        if(p.data_publicacao) {
                            const d = new Date(p.data_publicacao);
                            dateStr = d.toLocaleDateString('pt-BR');
                        }

                        const block = `
                        <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-5 items-center sm:items-start group hover:shadow-md transition-shadow relative overflow-hidden">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-gradient-to-br from-yellow-300 to-[#f1c40f] rounded-full opacity-20 blur-xl"></div>
                            
                            <img src="${imgUrl}" onclick="openImageModal('${imgUrl}')" alt="Foto Vencedor" class="w-24 h-24 sm:w-20 sm:h-20 rounded-full object-cover border-4 border-[#00a650] shadow-md flex-shrink-0 relative z-20 transform transition-transform duration-300 group-hover:scale-110 cursor-zoom-in origin-center hover:ring-4 hover:ring-[#00a650]/50">
                            
                            <div class="flex-1 text-center sm:text-left z-10 w-full">
                                <span class="bg-yellow-100 text-[#2c3e50] font-black text-[10px] uppercase px-2 py-0.5 rounded-full inline-block mb-1 shadow-sm border border-yellow-200">${p.numero_premiado}</span>
                                <h3 class="font-black text-gray-800 text-lg sm:text-xl leading-tight">${p.nome_ganhador}</h3>
                                
                                <p class="text-sm text-gray-600 font-medium mt-2 leading-relaxed bg-gray-50 p-3 rounded-xl inline-block sm:block w-full border border-gray-100 border-dashed">${p.premio_descricao}</p>
                            </div>
                        </div>
                        `;
                        listEl.insertAdjacentHTML('beforeend', block);
                    });
                } else {
                    emptyState.classList.remove('hidden');
                }
            } catch(e) {
                console.error(e);
                loader.classList.add('hidden');
                emptyState.innerHTML = '<span class="text-red-500 font-bold">Erro ao carregar a galeria.</span>';
                emptyState.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
