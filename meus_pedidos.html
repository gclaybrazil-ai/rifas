<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - $UPER$ORTE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/css/style.css">
    <link rel="icon" type="image/png" href="frontend/png/cifrao.png">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-24 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-md md:max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter" style="color: #00a650;">$UPER<span style="color: #2c3e50;">$ORTE</span></h1>
            <a href="index.html" class="flex items-center gap-1 text-[10px] sm:text-xs font-bold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full hover:bg-gray-200 transition-colors uppercase tracking-wider">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Voltar
            </a>
        </div>
    </header>

    <main class="max-w-md md:max-w-2xl mx-auto px-4 mt-8 flex flex-col gap-6" id="main-container">
        
        <!-- Search Form Component -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 text-center" id="search-container">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-[#2c3e50]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-[#2c3e50] tracking-tight mb-2">Localizar Pedidos</h2>
            <p class="text-sm font-medium text-gray-500 mb-6">Digite o número de WhatsApp usado na compra para verificarmos seu histórico e reservas atuais.</p>
            
            <form id="form-busca" class="flex flex-col gap-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path></svg>
                    </div>
                    <input type="tel" id="ipt-busca-whatsapp" placeholder="(00) 00000-0000" required class="w-full bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 pl-12 text-lg font-bold text-gray-700 focus:outline-none focus:border-[#00a650] focus:ring-4 focus:ring-[#00a650]/20 transition-all placeholder-gray-400 shadow-sm">
                </div>
                <button type="submit" id="btn-buscar-numeros" class="w-full bg-[#00a650] text-white font-black py-4 rounded-2xl shadow hover:bg-[#009647] active:scale-[0.98] transition-all flex justify-center items-center gap-2 uppercase tracking-wide">
                    Pesquisar Meu Histórico
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>

        <!-- Loader -->
        <div id="meus-numeros-loader" class="hidden flex-col items-center justify-center p-10 bg-white rounded-[2rem] shadow-sm border border-gray-100">
            <svg class="animate-spin h-10 w-10 text-[#00a650] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="font-bold text-gray-500 animate-pulse text-lg">Vasculhando nossa base de dados...</p>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="hidden flex-col gap-6">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <h3 class="text-xl font-black text-[#2c3e50] tracking-tight" id="results-title">Seus Pedidos</h3>
                    <p class="text-sm font-medium text-gray-500" id="results-subtitle">Todos os seus números encontrados.</p>
                </div>
                <button onclick="resetSearch()" class="text-xs font-bold text-gray-500 hover:text-[#00a650] bg-gray-100 px-3 py-1.5 rounded-full transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    Nova Busca
                </button>
            </div>
            
            <!-- Filtros de Status -->
            <div class="flex flex-wrap gap-2 mb-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="setFilter('')" id="filter-all" class="filter-btn text-[10px] font-black uppercase px-4 py-2 rounded-full transition-all bg-[#00a650] text-white border-2 border-[#00a650] shadow-sm">Todos</button>
                <button onclick="setFilter('pago')" id="filter-pago" class="filter-btn text-[10px] font-black uppercase px-4 py-2 rounded-full transition-all bg-white text-gray-500 border-2 border-gray-100 hover:border-green-200">Pagos</button>
                <button onclick="setFilter('pendente')" id="filter-pendente" class="filter-btn text-[10px] font-black uppercase px-4 py-2 rounded-full transition-all bg-white text-gray-500 border-2 border-gray-100 hover:border-yellow-200">Pendentes</button>
                <button onclick="setFilter('expirado')" id="filter-expirado" class="filter-btn text-[10px] font-black uppercase px-4 py-2 rounded-full transition-all bg-white text-gray-500 border-2 border-gray-100 hover:border-red-200">Cancelados</button>
            </div>

            <div id="lista-reservas" class="flex flex-col gap-5">
                <!-- Cards will be injected here -->
            </div>

            <!-- Paginação -->
            <div id="pagination-pedidos" class="flex justify-center items-center gap-2 mt-4 mb-2">
                <!-- Buttons injected here -->
            </div>
        </div>

    </main>

    <!-- Navigation Bar (Botton App Style) -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 z-50 px-6 py-2 pb-4">
        <div class="max-w-md md:max-w-2xl mx-auto flex justify-around items-center">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a href="meus_pedidos.html" class="flex flex-col items-center gap-1 text-[#00a650]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[10px] font-bold">Meus Nros</span>
            </a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iptWhats = document.getElementById('ipt-busca-whatsapp');
            const formBusca = document.getElementById('form-busca');
            
            // Mask
            iptWhats.addEventListener('input', function(e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
            });

            // State
            let currentPhone = '';
            let currentPage = 1;
            let currentStatus = '';

            window.resetSearch = function() {
                currentPhone = '';
                currentPage = 1;
                currentStatus = '';
                
                // Reset filter UI
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-[#00a650]', 'text-white', 'border-[#00a650]', 'shadow-sm');
                    btn.classList.add('bg-white', 'text-gray-500', 'border-gray-100');
                });
                document.getElementById('filter-all').classList.add('bg-[#00a650]', 'text-white', 'border-[#00a650]', 'shadow-sm');
                document.getElementById('filter-all').classList.remove('bg-white', 'text-gray-500', 'border-gray-100');

                document.getElementById('results-container').classList.add('hidden');
                document.getElementById('results-container').classList.remove('flex');
                document.getElementById('meus-numeros-loader').classList.add('hidden');
                document.getElementById('meus-numeros-loader').classList.remove('flex');
                document.getElementById('search-container').classList.remove('hidden');
                document.getElementById('ipt-busca-whatsapp').value = '';
                document.getElementById('ipt-busca-whatsapp').focus();
            }

            formBusca.addEventListener('submit', async (e) => {
                e.preventDefault();
                const rawWhats = iptWhats.value.trim();
                if(rawWhats.length < 14) {
                   alert('Digite um número de WhatsApp completo.');
                   return; 
                }
                
                currentPhone = rawWhats;
                currentPage = 1;
                fetchOrders();
            });

            window.setFilter = function(status) {
                currentStatus = status;
                currentPage = 1;
                
                // Update active button UI
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-[#00a650]', 'text-white', 'border-[#00a650]', 'shadow-sm');
                    btn.classList.add('bg-white', 'text-gray-500', 'border-gray-100');
                });
                
                const activeId = status === '' ? 'filter-all' : `filter-${status}`;
                const activeBtn = document.getElementById(activeId);
                if(activeBtn) {
                    activeBtn.classList.remove('bg-white', 'text-gray-500', 'border-gray-100');
                    activeBtn.classList.add('bg-[#00a650]', 'text-white', 'border-[#00a650]', 'shadow-sm');
                }

                fetchOrders();
            }

            window.changePage = function(page) {
                currentPage = page;
                fetchOrders();
            }

            async function fetchOrders() {
                document.getElementById('search-container').classList.add('hidden');
                document.getElementById('results-container').classList.add('hidden');
                document.getElementById('meus-numeros-loader').classList.remove('hidden');
                document.getElementById('meus-numeros-loader').classList.add('flex');
                
                try {
                    let url = `backend/api/get_my_numbers.php?whatsapp=${encodeURIComponent(currentPhone)}&page=${currentPage}`;
                    if(currentStatus) url += `&status=${currentStatus}`;

                    const res = await fetch(url);
                    const json = await res.json();
                    
                    document.getElementById('meus-numeros-loader').classList.add('hidden');
                    document.getElementById('meus-numeros-loader').classList.remove('flex');
                    
                    if(json.success) {
                        applySupportLink(json.link_suporte);
                        renderReservas(json.data);
                        renderPagination(json.total_pages, json.current_page);
                        document.getElementById('results-container').classList.remove('hidden');
                        document.getElementById('results-container').classList.add('flex');
                    } else {
                        alert(json.error || 'Falha ao buscar bilhetes.');
                        resetSearch();
                    }
                } catch(err) {
                    console.error(err);
                    alert('Erro na conexão. Tente novamente.');
                    resetSearch();
                }
            }

            function renderPagination(totalPages, current) {
                const container = document.getElementById('pagination-pedidos');
                container.innerHTML = '';
                
                if(totalPages <= 1) return;

                if(current > 1) {
                    container.insertAdjacentHTML('beforeend', `<button onclick="changePage(${current - 1})" class="px-3 py-2 bg-white border-2 border-gray-100 rounded-xl text-[10px] font-black text-gray-500 hover:border-green-200 transition-all uppercase">Ant</button>`);
                }

                let start = Math.max(1, current - 1);
                let end = Math.min(totalPages, start + 2);
                if(end === totalPages) start = Math.max(1, end - 2);

                for(let i = start; i <= end; i++) {
                    const activeClass = i === current ? 'bg-[#00a650] text-white border-[#00a650] shadow-sm' : 'bg-white text-gray-500 border-gray-100';
                    container.insertAdjacentHTML('beforeend', `<button onclick="changePage(${i})" class="w-10 h-10 flex items-center justify-center border-2 rounded-xl text-xs font-black transition-all ${activeClass}">${i}</button>`);
                }

                if(current < totalPages) {
                    container.insertAdjacentHTML('beforeend', `<button onclick="changePage(${current + 1})" class="px-3 py-2 bg-white border-2 border-gray-100 rounded-xl text-[10px] font-black text-gray-500 hover:border-green-200 transition-all uppercase">Próx</button>`);
                }
            }
        });



        function applySupportLink(link) {
            if(link) {
                const navAjuda = document.getElementById('link-ajuda-nav');
                if(navAjuda) {
                    navAjuda.href = link;
                    navAjuda.target = "_blank";
                }
            }
        }

        // Apply support link on load
        fetch('backend/api/get_rifas.php')
            .then(r => r.json())
            .then(data => {
                if(data.link_suporte) applySupportLink(data.link_suporte);
            });

        function renderReservas(data) {
            const container = document.getElementById('lista-reservas');
            container.innerHTML = '';
            
            if(data.length === 0) {
                container.innerHTML = `
                    <div class="text-center bg-white border border-gray-100 rounded-[2rem] p-10 shadow-sm">
                        <div class="text-5xl mb-4">🥺</div>
                        <p class="text-gray-800 font-bold text-xl mb-2">Puxa, não encontramos nada.</p>
                        <p class="text-sm text-gray-500 mb-6">Não conseguimos localizar nenhuma reserva ou pagamento no número informado.</p>
                        <button onclick="resetSearch()" class="bg-gray-100 text-gray-700 font-bold py-3 px-6 rounded-xl hover:bg-gray-200 transition-colors uppercase text-sm">Tentar outro WhatsApp</button>
                    </div>
                `;
            } else {
                data.forEach(item => {
                    const isPendente = item.status === 'pendente';
                    const isPago = item.status === 'pago';
                    
                    let statusBadge = '';
                    let actionHtml = '';

                    const dateStr = new Date(item.data_reserva).toLocaleString('pt-BR');
                    const totalFmt = parseFloat(item.valor_total).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                    const nrosText = item.numeros ? item.numeros : 'Nenhum';

                    if(isPendente) {
                        statusBadge = `<span class="bg-yellow-100 text-yellow-700 text-[10px] font-black uppercase px-3 py-1 rounded-full border border-yellow-200" id="badge-pendente-${item.reserva_id}" data-remaining="${item.remaining_seconds}">Aguardando Pagamento ⏳</span>`;
                        actionHtml = `
                            <button onclick="window.location.href='checkout.html?id=${item.reserva_id}'" class="w-full bg-[#00a650] hover:bg-[#009647] hover:shadow-lg hover:-translate-y-0.5 text-white font-black py-4 rounded-xl shadow transition-all flex justify-center items-center gap-2 text-sm uppercase cursor-pointer">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                Efetuar Pagamento
                            </button>
                        `;
                    } else if(isPago) {
                        statusBadge = '<span class="bg-green-100 text-[#00a650] text-[10px] font-black uppercase px-3 py-1 rounded-full border border-green-200">Pago / Confirmado ✅</span>';
                    } else {
                        statusBadge = '<span class="bg-red-100 text-red-600 text-[10px] font-black uppercase px-3 py-1 rounded-full border border-red-200">Expirada / Cancelada ❌</span>';
                    }

                    const imgOrTitle = item.imagem_url ? 
                        `<img src="${item.imagem_url}" class="w-16 h-16 sm:w-20 sm:h-20 rounded-xl sm:rounded-2xl object-cover shrink-0 border border-gray-100 shadow-sm">` 
                        : `<div class="w-16 h-16 sm:w-20 sm:h-20 rounded-xl sm:rounded-2xl bg-gray-100 flex items-center justify-center shrink-0 border border-gray-200 text-xl font-bold text-gray-400">🎫</div>`;

                    const classContainer = isPendente ? 'border-2 border-yellow-400/50 shadow-md ring-4 ring-yellow-50' : 'border border-gray-100 shadow-sm';

                    const card = `
                        <div class="bg-white rounded-[2rem] p-5 hover:shadow-lg transition-shadow relative ${classContainer}">
                            <div class="flex gap-4 mb-4">
                                ${imgOrTitle}
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-black text-[#2c3e50] text-lg leading-tight mb-2 truncate">${item.rifa_nome}</h4>
                                    <p class="text-xs font-bold text-gray-500 mb-3 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">Reserva: <span class="text-gray-800">#${item.reserva_id}</span></p>
                                    <div class="flex flex-wrap items-center gap-2">
                                        ${statusBadge}
                                        <span class="text-[10px] font-bold text-gray-400">${dateStr}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 mb-4">
                                <div class="flex justify-between items-center mb-2">
                                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Seus Números da Sorte:</p>
                                    <span class="text-xs font-black text-[#00a650]">${totalFmt}</span>
                                </div>
                                <p class="text-sm font-black text-[#8e44ad] break-words leading-relaxed">${nrosText}</p>
                            </div>
                            
                            ${actionHtml}
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });
            }
            
            document.getElementById('results-container').classList.remove('hidden');
            document.getElementById('results-container').classList.add('flex');

            // Countdown logic
            if(window.myNumsInterval) clearInterval(window.myNumsInterval);
            window.myNumsInterval = setInterval(() => {
                let hasPending = false;
                data.forEach(item => {
                    if (item.status === 'pendente') {
                        let span = document.getElementById('badge-pendente-' + item.reserva_id);
                        if (span) {
                            let remain = parseInt(span.getAttribute('data-remaining'));
                            if (remain > 0) {
                                hasPending = true;
                                remain--;
                                span.setAttribute('data-remaining', remain);
                                let m = Math.floor(remain / 60).toString().padStart(2, '0');
                                let s = (remain % 60).toString().padStart(2, '0');
                                span.innerText = `Aguardando Pagamento ⏳ (${m}:${s})`;
                            } else {
                                span.innerText = 'Expirando...';
                                span.classList.replace('text-yellow-700', 'text-red-600');
                                span.classList.replace('bg-yellow-100', 'bg-red-100');
                                span.classList.replace('border-yellow-200', 'border-red-200');
                                setTimeout(() => document.getElementById('form-busca').dispatchEvent(new Event('submit')), 1500);
                            }
                        }
                    }
                });
                if(!hasPending) clearInterval(window.myNumsInterval);
            }, 1000);
        }
    </script>
    <!-- Virtual Assistant -->
    <script src="frontend/js/assistant.js"></script>
</body>
</html>
